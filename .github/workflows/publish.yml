name: Publish to PyPI

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(python -c "import re,pathlib; print(re.search(r'__version__ = \"([^\"]+)\"', pathlib.Path('src/coop_sql_review/__init__.py').read_text()).group(1))")
          echo "tag=$TAG package=$PKG"
          test "$TAG" = "$PKG" || { echo "::error::tag v$TAG does not match package version $PKG — bump src/coop_sql_review/__init__.py first"; exit 1; }
      - run: pip install build
      - run: python -m build
      - name: Smoke-test the wheel
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/coop-sql-review --version
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # PyPI trusted publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  release:
    needs: publish  # only after the wheel is on PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create the GitHub Release
    steps:
      - uses: actions/checkout@v6
      - name: Create GitHub Release with auto-generated notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --verify-tag --title "$GITHUB_REF_NAME" --generate-notes
